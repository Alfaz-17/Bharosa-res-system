<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Cart - FoodieDash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff6933",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23140f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
<div class="flex items-center p-4 justify-between max-w-md mx-auto w-full">
<button class="size-10 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">My Cart</h1>
</div>
</header>
<!-- Cart Items Container -->
<main class="flex-1 overflow-y-auto max-w-md mx-auto w-full pb-32">
<div class="p-4 space-y-4">
<!-- Item 1 -->
<div class="flex items-center gap-4 bg-white dark:bg-primary/5 p-3 rounded-xl border border-primary/5 shadow-sm">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-20 shrink-0" data-alt="Delicious pepperoni pizza with melted cheese" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBuzer5KJ-O9aEvgFBoV1tGf3jkHInqKnIVtijHuC1E_fKSQG2LWOg7ftdcTrisDzIP9gBXyHH_zjuEkPPofZ8fY77UdYzGSTDJghhfnnOwW9bdtYjqldyPtcVtyUJGqrq_yd9urZC11X88grKY4I0be7jgF0eVHsLJuC8-lTRuFfkCRJ6M-nn7JMHvCjUCauPzIPxvfhg3IBJxB6AEuUq_LczQPQ67zNKaardhnDdCMN8y4IEQKOCI1zEUta7dbhk8LUeQZPu48as");'>
</div>
<div class="flex flex-col flex-1 justify-between h-20">
<div class="flex justify-between items-start">
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-tight line-clamp-1">Pepperoni Pizza</p>
<p class="text-primary text-sm font-medium mt-1">$24.00</p>
</div>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<div class="flex items-center justify-between">
<p class="text-xs text-slate-500 dark:text-slate-400">Large, Thin Crust</p>
<div class="flex items-center gap-3 bg-primary/10 rounded-full px-2 py-1">
<button class="flex h-6 w-6 items-center justify-center rounded-full bg-white dark:bg-background-dark text-primary shadow-sm">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="text-sm font-bold w-4 text-center">2</span>
<button class="flex h-6 w-6 items-center justify-center rounded-full bg-primary text-white shadow-sm">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex items-center gap-4 bg-white dark:bg-primary/5 p-3 rounded-xl border border-primary/5 shadow-sm">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-20 shrink-0" data-alt="Juicy classic burger with lettuce and tomato" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA4bZjN0HWeFaCcSkABKtiV58TxOJBKrmjASTQAZP7r5um8tFlPfChpEL7-KwqFvc3_cAfI5vZcKtKKCl9KQpPWxn1jSd8cZXABYes2_9EGBkc_UqPxScPhZQRZkbvd5gxp4RkJvVP00p3zsz_ABGPsNTakInXOUOGl-BUU_OK-Bf0hsTNjh3FB0SBO47AzXIUeyv2oHlIGPmKTblWFY0te9uYXpdb8Sq91ZfXq_E0fM3WN1sWhyzvxKEAIoW815ZFGB_LHa_R7AiM");'>
</div>
<div class="flex flex-col flex-1 justify-between h-20">
<div class="flex justify-between items-start">
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-tight line-clamp-1">Classic Burger</p>
<p class="text-primary text-sm font-medium mt-1">$12.00</p>
</div>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<div class="flex items-center justify-between">
<p class="text-xs text-slate-500 dark:text-slate-400">Extra Cheese</p>
<div class="flex items-center gap-3 bg-primary/10 rounded-full px-2 py-1">
<button class="flex h-6 w-6 items-center justify-center rounded-full bg-white dark:bg-background-dark text-primary shadow-sm">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="text-sm font-bold w-4 text-center">1</span>
<button class="flex h-6 w-6 items-center justify-center rounded-full bg-primary text-white shadow-sm">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Summary Section -->
<div class="mt-8 bg-white dark:bg-primary/5 rounded-2xl p-6 space-y-3 border border-primary/5">
<h3 class="text-base font-bold mb-4">Order Summary</h3>
<div class="flex justify-between items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">Subtotal</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">$36.00</p>
</div>
<div class="flex justify-between items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">Tax (8%)</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">$2.88</p>
</div>
<div class="flex justify-between items-center">
<div class="flex items-center gap-1">
<p class="text-slate-500 dark:text-slate-400 text-sm">Delivery Fee</p>
<span class="material-symbols-outlined text-[14px] text-primary">info</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">$5.00</p>
</div>
<div class="pt-3 mt-3 border-t border-primary/10 flex justify-between items-center">
<p class="text-lg font-bold">Total</p>
<p class="text-lg font-bold text-primary">$43.88</p>
</div>
</div>
<!-- Promo Code -->
<div class="flex gap-2">
<input class="flex-1 bg-white dark:bg-primary/5 border border-primary/10 rounded-lg px-4 text-sm focus:ring-primary focus:border-primary" placeholder="Promo code" type="text"/>
<button class="bg-primary/10 text-primary font-bold px-6 py-3 rounded-lg text-sm hover:bg-primary/20 transition-colors">Apply</button>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 bg-background-light dark:bg-background-dark border-t border-primary/10 p-4 pb-8 z-20">
<div class="max-w-md mx-auto space-y-4">
<!-- Navigation -->
<div class="flex gap-2 justify-between mb-4">
<a class="flex flex-1 flex-col items-center gap-1 text-primary opacity-60" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary opacity-60" href="#">
<span class="material-symbols-outlined">search</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Search</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">receipt_long</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Orders</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary opacity-60" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Profile</p>
</a>
</div>
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 flex items-center justify-center gap-2 hover:scale-[0.98] transition-transform active:bg-primary/90">
<span>Place Order</span>
<span class="bg-white/20 px-2 py-0.5 rounded text-sm">$43.88</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
